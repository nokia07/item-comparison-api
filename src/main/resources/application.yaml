spring:
  application:
    name: item-comparison-api
  datasource:
    url: jdbc:h2:mem:productsdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console
springdoc:
  api-docs:
    version: OPENAPI_3_0
server:
  port: 8080